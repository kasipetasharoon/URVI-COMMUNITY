<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URVI — Portal Login</title>
    <meta name="description" content="URVI Member Portal — secure login for team members, team heads and admins.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
</head>
<body>

    <div class="bg-particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card" id="loginCard">

            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-ring">
                    <img src="https://sai-balaji08.github.io/URVI-landing_page/assets/logo.png" alt="URVI Logo" class="logo" onerror="this.style.display='none'">
                </div>
                <h1>URVI</h1>
                <p class="tagline">Environmental Action Platform</p>
            </div>

            <!-- ── Login Form ── -->
            <div id="login-form">
                <div class="input-group">
                    <label for="credentialId"><i class="fas fa-id-card"></i> Credential ID</label>
                    <input type="text" id="credentialId" placeholder="e.g. URVI-8493" autocomplete="username" autocapitalize="characters">
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="eye-btn" onclick="togglePassword('password', this.querySelector('i'))"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button onclick="handleLogin()" id="loginBtn">Connect &rarr;</button>
            </div>

            <!-- ── Update Password Form ── -->
            <div id="update-password-form" style="display:none;">
                <div class="update-header">
                    <div class="update-icon"><i class="fas fa-shield-alt"></i></div>
                    <h3>Secure Your Account</h3>
                    <p class="info-text">First login detected — set a strong personal password to continue.</p>
                </div>
                <div class="input-group">
                    <label for="newPassword"><i class="fas fa-key"></i> New Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password">
                        <button type="button" class="eye-btn" onclick="togglePassword('newPassword', this.querySelector('i'))"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword"><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
                        <button type="button" class="eye-btn" onclick="togglePassword('confirmPassword', this.querySelector('i'))"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button onclick="handlePasswordUpdate()" id="updateBtn">Update &amp; Enter &rarr;</button>
            </div>

            <p id="error-msg" class="error"></p>

            <p class="footer-note">Contact your admin if you've forgotten your Credential ID.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
